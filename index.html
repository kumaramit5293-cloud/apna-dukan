<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a56db">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Shop">
<link rel="manifest" href="/apna-dukan/manifest.json">
<title>My Shop — GST Billing App</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --acc:#1a56db;--accl:#e8f0fe;--acch:#1447c0;
  --bg1:#fff;--bg2:#f9fafb;--bg3:#f3f4f6;
  --t1:#111827;--t2:#6b7280;--t3:#9ca3af;
  --bdr:#e5e7eb;--bdr2:#d1d5db;
  --ok-bg:#f0fdf4;--ok-t:#166534;
  --err-bg:#fef2f2;--err-t:#991b1b;
  --warn-bg:#fffbeb;--warn-t:#92400e;
  --info-bg:#eff6ff;--info-t:#1e40af
}
@media(prefers-color-scheme:dark){:root{
  --bg1:#1f2937;--bg2:#111827;--bg3:#0f172a;
  --t1:#f9fafb;--t2:#9ca3af;--t3:#6b7280;
  --bdr:#374151;--bdr2:#4b5563;
  --ok-bg:#052e16;--ok-t:#86efac;
  --err-bg:#450a0a;--err-t:#fca5a5;
  --warn-bg:#451a03;--warn-t:#fde68a;
  --info-bg:#1e3a5f;--info-t:#93c5fd
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--t1);font-size:14px}

/* ── AUTH ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.auth-card{background:var(--bg1);border:1px solid var(--bdr);border-radius:16px;padding:2rem;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.auth-logo{text-align:center;margin-bottom:1.5rem}
.auth-logo h1{font-size:22px;font-weight:700;margin-bottom:.25rem}
.auth-logo p{font-size:13px;color:var(--t2)}
.auth-tabs{display:flex;border:1px solid var(--bdr);border-radius:10px;padding:3px;margin-bottom:1.5rem;background:var(--bg2)}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;color:var(--t2);transition:all .2s;user-select:none}
.auth-tab.on{background:var(--bg1);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.divider-text{display:flex;align-items:center;gap:8px;margin:.875rem 0;font-size:11px;color:var(--t2)}
.divider-text::before,.divider-text::after{content:'';flex:1;height:1px;background:var(--bdr)}
.alert{padding:.75rem 1rem;border-radius:9px;font-size:13px;margin-bottom:.875rem;line-height:1.5}
.alert-err{background:var(--err-bg);color:var(--err-t);border:1px solid #fecaca}
.alert-ok{background:var(--ok-bg);color:var(--ok-t);border:1px solid #bbf7d0}
.alert-info{background:var(--info-bg);color:var(--info-t)}

/* ── FORMS ── */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:.75rem}
.fg label{font-size:12px;font-weight:500;color:var(--t2)}
input,select,textarea{font-size:13px;padding:9px 12px;border-radius:9px;border:1px solid var(--bdr2);background:var(--bg1);color:var(--t1);width:100%;transition:border-color .15s}
input:focus,select:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(26,86,219,.1)}

/* ── BUTTONS ── */
.btn{font-size:13px;padding:9px 16px;border-radius:9px;border:1px solid var(--bdr2);background:var(--bg1);color:var(--t1);cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:hover:not(:disabled){background:var(--bg2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btp{background:var(--acc);color:#fff;border-color:var(--acc)}.btp:hover:not(:disabled){background:var(--acch)}
.btg{background:#25d366;color:#fff;border-color:#25d366}
.bto{background:#217346;color:#fff;border-color:#217346}
.btgoog{background:var(--bg1);color:var(--t1);border-color:var(--bdr2)}
.bts{font-size:12px;padding:6px 11px}
.btd{color:var(--err-t);border-color:var(--bdr)}.btd:hover{background:var(--err-bg)}
.btn-block{width:100%}
.hr{border:none;border-top:1px solid var(--bdr);margin:.875rem 0}

/* ── APP SHELL ── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;background:var(--bg1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0}
.shop-hdr{padding:.875rem 1rem;border-bottom:1px solid var(--bdr)}
.shop-hdr .sname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.shop-hdr .gstin{font-size:10px;color:var(--t2);margin-top:1px}
.sync-badge{margin:.5rem .75rem .25rem;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:500}
.sync-ok{background:var(--ok-bg);color:var(--ok-t)}
.sync-off{background:var(--warn-bg);color:var(--warn-t)}
.nav{padding:.55rem 1rem;cursor:pointer;font-size:13px;color:var(--t2);border-left:3px solid transparent;transition:all .15s;user-select:none}
.nav:hover{background:var(--bg2);color:var(--t1)}
.nav.on{background:var(--accl);color:var(--acc);border-left-color:var(--acc);font-weight:500}
.sidebar-footer{margin-top:auto;border-top:1px solid var(--bdr);padding:.625rem}
.user-pill{display:flex;align-items:center;gap:8px;padding:.5rem .75rem;border-radius:8px;cursor:pointer;background:var(--bg2);transition:background .15s}
.user-pill:hover{background:var(--bg3)}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.uname{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uemail{font-size:10px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:.75rem 1.25rem;background:var(--bg1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:8px}
.topbar h1{font-size:15px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:1.25rem}
.tab{display:none}.tab.on{display:block}

/* ── LAYOUT ── */
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.25rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:.75rem}

/* ── DESKTOP SIDEBAR ── */
@media(min-width:721px){
  .bottom-nav{display:none!important}
  .content{padding-bottom:1.25rem}
}

/* ── MOBILE: hide sidebar, show bottom nav ── */
@media(max-width:720px){
  .g2,.g3,.g4{grid-template-columns:1fr}
  .sidebar{display:none!important}
  .app{flex-direction:column}
  .main{height:100vh}
  .topbar{padding:.625rem 1rem;safe-area-inset-top:env(safe-area-inset-top)}
  .content{padding:1rem 1rem 90px;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .bottom-nav{display:flex!important}
}

/* ── BOTTOM NAVIGATION ── */
.bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg1);
  border-top:1px solid var(--bdr);
  height:62px;
  padding-bottom:env(safe-area-inset-bottom);
  z-index:300;
  align-items:stretch;
  box-shadow:0 -2px 12px rgba(0,0,0,.08);
}
.bn-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;color:var(--t2);font-size:10px;font-weight:500;
  transition:color .15s;padding:6px 2px;border:none;background:none;
  -webkit-tap-highlight-color:transparent;
}
.bn-item.on{color:var(--acc)}
.bn-item svg{width:20px;height:20px;flex-shrink:0}
.bn-fab{
  flex:0 0 56px;display:flex;align-items:center;justify-content:center;
  margin:0 8px;margin-bottom:2px;
}
.bn-fab-btn{
  width:52px;height:52px;border-radius:50%;background:var(--acc);
  display:flex;align-items:center;justify-content:center;
  border:none;cursor:pointer;box-shadow:0 4px 12px rgba(26,86,219,.4);
  -webkit-tap-highlight-color:transparent;transition:transform .15s;
}
.bn-fab-btn:active{transform:scale(.95)}
.bn-fab-btn svg{width:24px;height:24px;color:#fff}

/* ── CAMERA SCANNER ── */
.scanner-wrap{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#000;z-index:800;display:flex;flex-direction:column;
}
.scanner-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.25rem;padding-top:calc(1rem + env(safe-area-inset-top));
  background:rgba(0,0,0,.7);color:#fff;
}
.scanner-topbar h2{font-size:16px;font-weight:600}
.scanner-video-wrap{
  flex:1;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
#scanner-video{width:100%;height:100%;object-fit:cover}
.scanner-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.scanner-frame{
  width:72vw;max-width:280px;height:72vw;max-height:280px;
  border:3px solid #1a56db;border-radius:16px;position:relative;
  box-shadow:0 0 0 9999px rgba(0,0,0,.55);
}
.scanner-frame::before,.scanner-frame::after{
  content:'';position:absolute;width:24px;height:24px;border-color:#fff;border-style:solid;
}
.scanner-frame::before{top:-3px;left:-3px;border-width:4px 0 0 4px;border-radius:3px 0 0 0}
.scanner-frame::after{bottom:-3px;right:-3px;border-width:0 4px 4px 0;border-radius:0 0 3px 0}
.scanner-line{
  position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#1a56db,transparent);
  animation:scanline 2s linear infinite;
}
@keyframes scanline{0%{top:0}100%{top:100%}}
.scanner-hint{
  color:#fff;font-size:13px;text-align:center;
  padding:.875rem;background:rgba(0,0,0,.7);
}
.scanner-manual{
  padding:1rem;background:rgba(0,0,0,.8);
  display:flex;gap:8px;padding-bottom:calc(1rem + env(safe-area-inset-bottom));
}
.scanner-manual input{
  flex:1;background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);
  color:#fff;
}
.scanner-manual input::placeholder{color:rgba(255,255,255,.5)}

/* ── OFFLINE BANNER ── */
#offline-banner{
  display:none;position:fixed;top:0;left:0;right:0;
  background:#92400e;color:#fef3c7;
  padding:.5rem 1rem;font-size:12px;text-align:center;z-index:999;
  padding-top:calc(.5rem + env(safe-area-inset-top));
}

/* ── PWA INSTALL PROMPT ── */
#install-prompt{
  display:none;position:fixed;bottom:80px;left:1rem;right:1rem;
  background:var(--bg1);border:1px solid var(--bdr);border-radius:12px;
  padding:1rem;z-index:400;box-shadow:0 4px 20px rgba(0,0,0,.15);
}

/* ── TOUCH IMPROVEMENTS ── */
.btn{min-height:44px}
.nav{min-height:44px;display:flex;align-items:center}
input,select{min-height:44px}
@media(max-width:720px){
  .card{padding:.875rem}
  .btn{font-size:14px}
  td,th{padding:8px 8px}
  .no-mobile{display:none}
  #toast{bottom:72px}
}
.card{background:var(--bg1);border-radius:12px;border:1px solid var(--bdr);padding:1rem 1.25rem;margin-bottom:1rem}
.ct{font-size:13px;font-weight:600;margin-bottom:.875rem;color:var(--t1)}
.sc{background:var(--bg2);border-radius:9px;padding:.875rem 1rem}
.sc .lbl{font-size:11px;color:var(--t2);margin-bottom:3px}
.sc .val{font-size:20px;font-weight:700;color:var(--t1)}
.sc .sub{font-size:11px;color:var(--t3);margin-top:2px}
table{width:100%;font-size:12px;border-collapse:collapse}
th{text-align:left;padding:6px 10px;background:var(--bg2);color:var(--t2);font-weight:500;font-size:11px}
td{padding:7px 10px;border-bottom:1px solid var(--bdr);color:var(--t1)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.bdg{display:inline-block;font-size:11px;padding:2px 8px;border-radius:5px;font-weight:500}
.bg{background:var(--ok-bg);color:var(--ok-t)}
.br{background:var(--err-bg);color:var(--err-t)}
.bb{background:var(--info-bg);color:var(--info-t)}
.by{background:var(--warn-bg);color:var(--warn-t)}
.fr{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rbox{background:var(--bg2);border-radius:9px;padding:.875rem;margin-bottom:.875rem}
.rbox .rtitle{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:.625rem}
.rrow{display:flex;align-items:center;gap:8px;margin-bottom:.5rem}
.rrow label{font-size:12px;color:var(--t2);min-width:130px}
.rrow input,.rrow select{max-width:120px}
.rout{font-size:13px;font-weight:600;padding:5px 10px;background:var(--bg1);border-radius:8px;border:1px solid var(--bdr)}
.pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;border:1px solid var(--bdr2);cursor:pointer;margin:2px}
.pill:hover{background:var(--accl);border-color:var(--acc);color:var(--acc)}
.btots .r{display:flex;justify-content:space-between;padding:3px 0;font-size:13px;color:var(--t2)}
.btots .g{display:flex;justify-content:space-between;font-size:15px;font-weight:700;border-top:1px solid var(--bdr);margin-top:4px;padding-top:7px;color:var(--t1)}
.bprev{background:var(--bg1);border:1px solid var(--bdr);border-radius:12px;padding:1.25rem;max-width:560px;margin:0 auto}
.bph{text-align:center;border-bottom:1px dashed var(--bdr);padding-bottom:.75rem;margin-bottom:.75rem}
.bph h2{font-size:16px;font-weight:700}
.bph p{font-size:11px;color:var(--t2);margin-top:2px}
.bmeta{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-bottom:.75rem}
#toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.75rem 1.25rem;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;display:none;border:1px solid var(--bdr);background:var(--bg1);max-width:300px;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.loader{width:16px;height:16px;border:2px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── AUTOCOMPLETE ── */
.ac-wrap{position:relative}
.ac-drop{position:absolute;top:100%;left:0;right:0;background:var(--bg1);border:1px solid var(--bdr2);border-radius:9px;z-index:200;max-height:220px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.12);margin-top:2px}
.ac-item{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:.5px solid var(--bdr)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.active{background:var(--accl);color:var(--acc)}
.ac-item small{font-size:11px;color:var(--t2);margin-left:6px}
/* ── MODAL ── */
.modal-wrap{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:var(--bg1);border-radius:16px;border:1px solid var(--bdr);padding:1.5rem;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}
/* ── UDHAR ── */
.udhar-amt{color:var(--err-t);font-weight:600}
.paid-amt{color:var(--ok-t);font-weight:600}
/* ── SIGNATURE ── */
.sig-area{margin-top:1.25rem;padding-top:.875rem;border-top:1px dashed var(--bdr);display:flex;justify-content:flex-end}
.sig-box{text-align:center;width:180px}
.sig-line{border-bottom:1px solid var(--t1);height:50px;margin-bottom:4px}
.sig-label{font-size:10px;color:var(--t2)}
/* ── TOTAL INPUT HIGHLIGHT ── */
input.total-inp{background:var(--accl);border-color:var(--acc);font-weight:600}
input.total-inp:focus{background:var(--accl)}
@media print{
  body > *{display:none!important}
  #bill-print-area{display:block!important;position:fixed;top:0;left:0;width:100%;z-index:99999}
  #bill-print-area .no-print{display:none!important}
  #bill-print-area .bprev{border:none;padding:0;box-shadow:none;max-width:100%}
}
#bill-print-area{display:none}
</style>
</head>

<div id="toast"></div>
<div id="modal-root"></div>

<div id="install-prompt">

// ── OFFLINE DETECTION ──

// ── PWA INSTALL ──
let deferredInstall=null;

  e.preventDefault();deferredInstall=e;
  const prompt=document.getElementById('install-prompt');
  if(prompt)setTimeout(()=>prompt.style.display='block',3000);

  if(!deferredInstall)return;

  if(outcome==='accepted'){document.getElementById('install-prompt').style.display='none'}
  deferredInstall=null;
}

// ── Rate limiting: brute force से बचाव ──
function _checkRateLimit(){
  const now=Date.now();
  if(now-_lastAuthAttempt<1000){return false;} // 1 sec minimum gap
  if(now-_lastAuthAttempt<30000) _authAttemptCount++;
  else _authAttemptCount=1;
  _lastAuthAttempt=now;
  if(_authAttemptCount>5){
    const wait=Math.ceil((30000-(now-_lastAuthAttempt+30000*((_authAttemptCount-5)/5)))/1000);
    setAlert('auth-alert',`बहुत ज़्यादा attempts — ${Math.max(10,wait)} seconds बाद try करें`,'warn');
    return false;
  }
  return true;
}

// ── SUPABASE INIT ──
function initApp() {
  if (typeof window.supabase === 'undefined') {
    setTimeout(initApp, 50);
    return;
  }
  sb = window.supabase.createClient(SB_URL, SB_KEY, {
    auth: {
      autoRefreshToken: true,
      persistSession: true,
      detectSessionInUrl: true,
      storage: localStorage
    }
  });

  sb.auth.onAuthStateChange(async(event, session)=>{
    console.log('Auth event:', event);
    if(event==='SIGNED_IN' && session && !currentUser && !_authHandled){
      _authHandled = true;
      currentUser = session.user;
      _extractRoleFromSession(session);
      await loadShopForUser();
    }
    if(event==='TOKEN_REFRESHED' && session){
      // JWT में user_role हो तभी override करें — नहीं तो DB-verified role रहने दें
      try{
        const payload=JSON.parse(atob(session.access_token.split('.')[1]));
        if(payload.user_role && payload.user_role!=='user'){
          currentUserRole=payload.user_role; // Hook से आया — trust करें
        }
        // अगर JWT में 'user' है और हमारे पास DB से 'admin' है — रखें
      }catch(_){}
      if(currentUser) localStorage.setItem('sb-session', JSON.stringify(session));
      return;
    }
    if(event==='SIGNED_OUT'){
      currentUser=null; currentUserRole='user'; _authHandled=false;
      renderAuth('login');
    }
    if(event==='PASSWORD_RECOVERY'){
      renderPasswordReset();
    }
  });

  renderRoot();
}

// ── JWT से user_role निकालें (server-side hook से inject होता है) ──
function _extractRoleFromSession(session){
  try{
    if(!session?.access_token) return;
    const payload=JSON.parse(atob(session.access_token.split('.')[1]));
    if(payload.user_role && payload.user_role !== 'user'){
      // Hook ने explicitly कोई role inject की — trust करें
      currentUserRole = payload.user_role;
      console.log('Role from JWT:', currentUserRole);
    } else if(currentUserRole === 'user'){
      // JWT में role नहीं — अगर पहले DB से admin मिला था तो मत बदलो
      console.log('Role from JWT: user (keeping existing:', currentUserRole, ')');
    }
  }catch(e){
    console.log('JWT role extract failed:', e.message);
  }
}

// ── DB से role verify करें — Hook enable न हो तो fallback ──
async function _verifyRoleFromDB(){
  try{
    const {data,error}=await sb.from('user_roles').select('role').eq('user_id',currentUser.id).single();
    if(error){
      console.log('user_roles error:', error.message, error.code);
      return;
    }
    if(data?.role && data.role !== currentUserRole){
      currentUserRole = data.role;
      console.log('Role from DB:', currentUserRole);
      // Role बदली — sidebar re-render करें ताकि Admin Panel दिखे
      if(document.getElementById('root')?.querySelector('.app')){
        renderApp();
      }
    }
  }catch(e){
    console.log('DB role check skipped:', e.message);
  }
}

// ── INIT ──
async function renderRoot(){
  document.getElementById('root').innerHTML=`
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px">
    <div class="loader" style="width:32px;height:32px;border-width:3px"></div>
    <div id="load-msg" style="font-size:13px;color:var(--t2)">Opening app...</div>
  </div>`;
  const setMsg = m => { const e=document.getElementById('load-msg'); if(e) e.textContent=m; };

  // ── STEP 1: Cached session se turant load karo (no network wait) ──
  const cached = localStorage.getItem('sb-session');
  if(cached){
    try{
      const parsed = JSON.parse(cached);
      if(parsed?.user && parsed?.access_token){
        // App immediately load karo — network verify background me
        currentUser = parsed.user;
        _extractRoleFromSession(parsed);
        _authHandled = true;
        await loadShopForUser();
        // Background me token refresh karo silently
        _bgRefreshSession(parsed.refresh_token);
        return;
      }
    }catch(e){ localStorage.removeItem('sb-session'); }
  }

  // ── STEP 2: Koi cached session nahi — server se check karo ──
  setMsg('Checking connection...');
  try {
    // Supabase getSession() — 6 second hard timeout
    const result = await Promise.race([
      sb.auth.getSession(),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),6000))
    ]);
    const session = result?.data?.session;
    if(session){
      _authHandled = true;
      currentUser = session.user;
      _extractRoleFromSession(session);
      localStorage.setItem('sb-session', JSON.stringify(session));
      await loadShopForUser();
      return;
    }
  } catch(e){
    console.log('getSession error:', e.message);
    // Network problem — ping to check if paused or offline
    try{
      const pingRes = await Promise.race([
        fetch(SB_URL+'/rest/v1/',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}),
        new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),5000))
      ]);
      if(!pingRes.ok && pingRes.status!==401 && pingRes.status!==400){
        showConnectionError(pingRes.status); return;
      }
    }catch(pe){
      showConnectionError('network'); return;
    }
  }

  renderAuth('login');
}

// Background me silently token refresh karo — app block nahi hogi
async function _bgRefreshSession(refreshToken){
  if(!refreshToken) return;
  try{
    const {data, error} = await Promise.race([
      sb.auth.refreshSession({refresh_token: refreshToken}),
      new Promise((_,r)=>setTimeout(()=>r({data:null,error:{message:'timeout'}}),8000))
    ]);
    if(!error && data?.session){
      _extractRoleFromSession(data.session);
      localStorage.setItem('sb-session', JSON.stringify(data.session));
      console.log('Session refreshed in background');
    } else if(error && error.message !== 'timeout'){
      // Refresh token expired — clear it, user will need to re-login next time
      console.log('Refresh token expired, cleared');
      localStorage.removeItem('sb-session');
    }
  }catch(e){ console.log('bg refresh error:', e.message); }
}

  const isPaused = (status===503||status===404||status==='network');
  document.getElementById('root').innerHTML=`

  <p style="font-size:13px;color:var(--t2);margin-bottom:1.25rem;line-height:1.6">
    ${isPaused
      ? `Your Supabase project may be <b>paused</b> (free tier pauses after 1 week of inactivity).<br><br>
         <b>Fix:</b> Go to <a href="https://supabase.com/dashboard" target="_blank" style="color:var(--acc)">supabase.com/dashboard</a> → 
         Select your project → Click <b>"Restore project"</b>.<br><br>
         Status code: ${status}`
      : 'Please check your internet connection and try again.'}
  </p>
  <button class="btn btp btn-block" onclick="renderRoot()" style="margin-bottom:.75rem">🔄 Retry Connection</button>
  ${isPaused?'':''}
  <button class="btn btn-block" onclick="offlineMode()" style="margin-top:.5rem">📱 Continue Offline (local data only)</button>
</div>
</div>`;
}

function offlineMode(){
  const cached = localStorage.getItem('sb-session');

    try{

    }catch(e){}
  }
  // No cached user — show auth but warn
  renderAuth('login');
  setTimeout(()=>setAlert('auth-alert','⚠️ Offline mode — Login may not work without internet.','warn'),100);
}

async function testConnection(){
  const alertEl = document.getElementById('auth-alert');
  if(alertEl) alertEl.innerHTML='<div class="alert alert-info">Testing connection...</div>';
  try{
    const r = await Promise.race([
      fetch(SB_URL+'/rest/v1/',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}),
      new Promise((_,rj)=>setTimeout(()=>rj(new Error('timeout after 8s')),8000))
    ]);
    if(r.ok || r.status===401 || r.status===400){
      setAlert('auth-alert','✅ Supabase connection OK (status '+r.status+'). Server is reachable.','ok');
    } else if(r.status===503){
      setAlert('auth-alert','😴 Supabase project is PAUSED. Go to dashboard and click "Restore project".');
    } else {
      setAlert('auth-alert','⚠️ Unexpected status: '+r.status);
    }
  }catch(e){
    setAlert('auth-alert','❌ Cannot reach server: '+e.message+'<br>Check your internet connection.');
  }
}

async function doLogin(){
  if(!_checkRateLimit())return;
  const email=document.getElementById('a-email').value.trim();
  const pass=document.getElementById('a-pass').value;
  if(!email||!pass){setAlert('auth-alert','Please enter Email and Password');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){setAlert('auth-alert','Please enter a valid email address');return;}
  const btn=document.getElementById('auth-btn');
  btn.disabled=true;
  btn.innerHTML='<span class="loader"></span> Logging in...';
  setAlert('auth-alert','');

  try{
    const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){
      btn.disabled=false; btn.textContent='Login →';
      // Detailed error messages
      const code = error.message?.toLowerCase()||'';
      if(code.includes('invalid login') || code.includes('invalid credentials') || code.includes('wrong')){
        setAlert('auth-alert','❌ Wrong email or password. Please check and try again.');
      } else if(code.includes('email not confirmed')){
        setAlert('auth-alert',`
          ⚠️ Your email is not confirmed yet.<br>
          <small>Check your inbox (and spam folder) for the confirmation email.</small><br>
          <button class="btn bts btp" style="margin-top:8px" onclick="resendConfirmation('${email}')">
            📧 Resend Confirmation Email
          </button>
        `);
      } else if(code.includes('rate limit') || code.includes('too many')){
        setAlert('auth-alert','⏳ Too many attempts. Please wait a few minutes and try again.');
      } else if(code.includes('network') || code.includes('fetch')){
        setAlert('auth-alert','📡 Network error. Please check your internet connection.');
      } else {
        setAlert('auth-alert','❌ '+error.message);
      }
      return;
    }
    currentUser=data.user;
    _extractRoleFromSession(data.session);
    localStorage.setItem('sb-session',JSON.stringify(data.session));
    await loadShopForUser();
  } catch(e){
    btn.disabled=false; btn.textContent='Login →';
    setAlert('auth-alert','📡 Connection failed. Check internet and try again.<br><small>'+e.message+'</small>');
  }
}

async function doSignup(){
  if(!_checkRateLimit())return;
  const shopName=document.getElementById('a-shop').value.trim();
  const email=document.getElementById('a-email').value.trim();
  const pass=document.getElementById('a-pass').value;
  const gstin=(document.getElementById('a-gstin')?.value||'').trim().toUpperCase();
  const phone=(document.getElementById('a-phone')?.value||'').trim();
  setAlert('auth-alert','');

  if(!shopName){setAlert('auth-alert','Shop name is required');return;}
  if(!email){setAlert('auth-alert','Email is required');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){setAlert('auth-alert','Please enter a valid email address');return;}
  if(!pass||pass.length<6){setAlert('auth-alert','Password must be at least 6 characters');return;}
  if(gstin && gstin.length!==15){setAlert('auth-alert','GSTIN must be exactly 15 characters');return;}

  const btn=document.getElementById('auth-btn');
  btn.disabled=true;
  btn.innerHTML='<span class="loader"></span> Checking...';

  try{
    // Check duplicate shop name or GSTIN
    const dupQuery=await sb.from('shops').select('id,name,gstin').limit(500);
    if(dupQuery.data){
      const existing=dupQuery.data;
      const nameDup=existing.find(s=>s.name&&s.name.toLowerCase()===shopName.toLowerCase());
      const gstinDup=gstin&&existing.find(s=>s.gstin&&s.gstin.toUpperCase()===gstin.toUpperCase());
      const waLink='https://wa.me/91'+getContactPhone()+'?text='+encodeURIComponent('Hello, I want to register my shop: '+shopName+(gstin?' (GSTIN: '+gstin+')':''));
      if(nameDup){
        btn.disabled=false;btn.textContent='Create Account →';
        setAlert('auth-alert','⚠️ A shop with this name is already registered.<br><a href="'+waLink+'" target="_blank" style="color:var(--acc)">📲 Contact Admin on WhatsApp ('+getContactPhone()+')</a>');
        return;
      }
      if(gstinDup){
        btn.disabled=false;btn.textContent='Create Account →';
        setAlert('auth-alert','⚠️ This GSTIN is already registered.<br><a href="'+waLink+'" target="_blank" style="color:var(--acc)">📲 Contact Admin on WhatsApp ('+getContactPhone()+')</a>');
        return;
      }
    }

    btn.innerHTML='<span class="loader"></span> Creating Account...';
    const {data,error}=await sb.auth.signUp({
      email, password:pass,
      options:{
        data:{shop_name:shopName, gstin, phone},
        emailRedirectTo: window.location.origin + window.location.pathname
      }
    });

    if(error){
      btn.disabled=false; btn.textContent='Create Account →';
      const msg = error.message?.toLowerCase()||'';
      if(msg.includes('already registered') || msg.includes('user already exists') || msg.includes('already been registered')){
        setAlert('auth-alert','⚠️ This email is already registered. <span style="cursor:pointer;color:var(--acc);text-decoration:underline" onclick="renderAuth(\'login\')">Login instead →</span>');
      } else if(msg.includes('rate limit') || msg.includes('too many')){
        setAlert('auth-alert','⏳ Too many signup attempts. Please wait a few minutes.');
      } else if(msg.includes('invalid email')){
        setAlert('auth-alert','❌ Invalid email address format.');
      } else if(msg.includes('password') && msg.includes('weak')){
        setAlert('auth-alert','❌ Password is too weak. Use a stronger password with letters and numbers.');
      } else {
        setAlert('auth-alert','❌ '+error.message);
      }
      return;
    }

    // Check if user was created and session exists (email confirmation disabled)
    if(data.user && data.session){
      // Email confirmation is OFF — user is directly logged in
      currentUser=data.user;
      _extractRoleFromSession(data.session);
      localStorage.setItem('sb-session',JSON.stringify(data.session));
      await createShopInDB(shopName,gstin,phone,data.user.id);
      await loadShopForUser();
      return;
    }

    // Email confirmation is ON
    if(data.user && !data.session){
      setAlert('auth-alert',`
        <div style="line-height:1.7">
          ✅ <b>Account created!</b><br>
          A confirmation email has been sent to <b>${email}</b><br>
          <small style="color:var(--t2)">
            1. Check your inbox (and spam/junk folder)<br>
            2. Click the confirmation link in the email<br>
            3. Come back here and Login
          </small><br>
          <hr style="border:none;border-top:1px solid var(--bdr);margin:.5rem 0">
          Didn't receive it?
          <button class="btn bts btp" style="margin-top:4px" onclick="resendConfirmation('${email}')">
            📧 Resend Email
          </button>
        </div>
      `,'ok');
      btn.disabled=false; btn.textContent='Create Account →';
      return;
    }

    // Fallback
    setAlert('auth-alert','Something unexpected happened. Please try again.','warn');
    btn.disabled=false; btn.textContent='Create Account →';

  } catch(e){
    btn.disabled=false; btn.textContent='Create Account →';
    setAlert('auth-alert','📡 Connection failed. Check internet and try again.<br><small>'+e.message+'</small>');
  }
}

async function createShopInDB(shopName,gstin,phone,userId){
  const shopId='shop_'+userId;
  const settings={shopName,gstin,phone,state:'Bihar',address:'',bankName:'',accountNo:'',ifsc:'',upiId:'',billPrefix:'INV',nextBill:1001};

async function loadShopForUser(){
  // Step 1: Fresh JWT से role लें
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(session){ _extractRoleFromSession(session); localStorage.setItem('sb-session',JSON.stringify(session)); }
  }catch(_){}

  // Step 2: JWT में role नहीं है (Hook अभी enable नहीं) तो DB से check करें
  if(currentUserRole==='user'){
    await _verifyRoleFromDB();
  }

  try{
    const {data,error}=await sb.from('shops').select('*').eq('owner_id',currentUser.id).single();
    if(error||!data){
      // नई दुकान बनाएं
      const meta=currentUser.user_metadata||{};
      const shopName=meta.shop_name||meta.full_name||currentUser.email.split('@')[0];
      await createShopInDB(shopName,meta.gstin||'',meta.phone||'',currentUser.id);
      const {data:d2}=await sb.from('shops').select('*').eq('owner_id',currentUser.id).single();
      currentShop=d2;
    }else{
      currentShop=data;
    }
  }catch(e){
    // Network error — local mode से चलाएं
    console.log('loadShop offline:',e.message);
  }

  // currentShop null हो तो भी app चलाएं (offline mode)
  if(!currentShop){
    const fallbackId='shop_'+currentUser.id;
    currentShop={id:fallbackId,settings:{}};
  }

  D.settings=currentShop?.settings||{};
  // Defaults
  if(!D.settings.shopName)D.settings.shopName=currentUser.email?.split('@')[0]||'Shop';
  if(!D.settings.hasOwnProperty('billPrefix'))D.settings.billPrefix='';
  if(!D.settings.nextBill)D.settings.nextBill=1;
  if(!D.settings.state)D.settings.state='Bihar';
  if(!D.billItems)D.billItems=[];
  if(!D.udhar)D.udhar=[];

  // Trial check
  checkTrialStatus();
  // पहले local data load करें — तुरंत app दिखाएं
  loadLocal();
  renderApp();
  // फिर background में sync करें
  syncAll().catch(()=>{});
}

// ── SYNC ──
async function syncAll(){
  if(!currentShop?.id){updSync(false);return;}
  try{
    const [pr,cu,bi,sh,pu]=await Promise.all([
      sb.from('products').select('*').eq('shop_id',currentShop.id).order('id'),
      sb.from('customers').select('*').eq('shop_id',currentShop.id).order('id'),
      sb.from('bills').select('*').eq('shop_id',currentShop.id).order('date',{ascending:false}),
      sb.from('shops').select('settings').eq('id',currentShop.id).single(),
      sb.from('purchases').select('*').eq('shop_id',currentShop.id).order('date',{ascending:false}).limit(200)
    ]);
    if(pr.error)throw pr.error;
    D.products=(pr.data||[]).map(p=>({
      id:p.id,name:p.name,barcode:p.barcode||'',hsn:p.hsn||'',
      gst:+p.gst||0,buyPrice:+p.buy_price||0,sellPrice:+p.sell_price||0,
      stock:+p.stock||0,minStock:+p.min_stock||0,unit:p.unit||'Pcs'
    }));
    D.customers=(cu.data||[]).map(c=>({id:c.id,name:c.name,phone:c.phone,gstin:c.gstin,address:c.address,totalPurchase:c.total_purchase,udhar:c.udhar||0}));
    D.bills=(bi.data||[]).map(b=>({id:b.id,date:b.date,customer:b.customer,custId:b.cust_id,custGstin:b.cust_gstin,custAddr:b.cust_addr,items:b.items,subtotal:b.subtotal,gstTotal:b.gst_total,grand:b.grand,payment:b.payment}));
    D.purchases=!pu.error?(pu.data||[]).map(p=>({id:p.id,date:p.date,supplier:p.supplier,items:p.items,total:p.total,notes:p.notes})):[];
    if(sh.data?.settings)D.settings={...D.settings,...sh.data.settings};
    if(!D.billItems)D.billItems=[];
    saveLocal();updSync(true);renderAllTabs();toast('Sync complete ✓');
  }catch(e){updSync(false);toast('Offline mode — using local data','warn');}
}

// ── PRODUCT AUTOCOMPLETE ──
let acIdx=-1;
function prodAC(v){
  const drop=document.getElementById('ac-drop');if(!drop)return;
  acIdx=-1;
  if(!v||v.length<1){drop.style.display='none';return}
  const list=D.products.filter(p=>
    p.name.toLowerCase().includes(v.toLowerCase())||
    (p.barcode&&p.barcode.includes(v))
  ).slice(0,10);
  if(!list.length){drop.style.display='none';return}
  drop.style.display='block';
  drop.innerHTML=list.map((p,i)=>`<div class="ac-item" data-idx="${i}" onclick="pickProd(${p.id})">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <b>${safeText(p.name)}</b>
      <span style="font-size:11px;color:var(--acc);font-weight:600">${fmt(p.sellPrice)}</span>
    </div>
    <small style="color:var(--t2)">GST: ${p.gst}% ${p.hsn?'| HSN: '+p.hsn:''} ${+p.minStock>0?'| Stock: '+p.stock+' '+p.unit:''}</small>
  </div>`).join('');
}
function pickProd(id){
  const p=D.products.find(x=>x.id===id);if(!p)return;
  document.getElementById('sp-text').value=p.name;
  document.getElementById('sr').value=p.sellPrice;
  document.getElementById('sg').value=p.gst;
  document.getElementById('sh').value=p.hsn||'';
  document.getElementById('ac-drop').style.display='none';
  syncTotal();
  document.getElementById('sq').focus();
}
function prodACKey(e){
  const drop=document.getElementById('ac-drop');const items=drop?.querySelectorAll('.ac-item');
  if(!items||!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();acIdx=Math.min(acIdx+1,items.length-1);items.forEach((x,i)=>x.classList.toggle('active',i===acIdx))}
  else if(e.key==='ArrowUp'){e.preventDefault();acIdx=Math.max(acIdx-1,0);items.forEach((x,i)=>x.classList.toggle('active',i===acIdx))}
  else if(e.key==='Enter'&&acIdx>=0){e.preventDefault();items[acIdx].click()}
  else if(e.key==='Escape'){drop.style.display='none';acIdx=-1}
}
document.addEventListener('click',e=>{const d=document.getElementById('ac-drop');if(d&&!e.target.closest('.ac-wrap'))d.style.display='none'});

// ── TOTAL ↔ RATE SYNC ──
function syncTotal(){
  const qty=+document.getElementById('sq')?.value||1;
  const rate=+document.getElementById('sr')?.value||0;
  const gst=+document.getElementById('sg')?.value||0;
  const tot=document.getElementById('stot');
  if(tot&&document.activeElement!==tot)tot.value=rate?( rate*qty*(1+gst/100)).toFixed(2):'';
}
function syncRate(){
  const qty=+document.getElementById('sq')?.value||1;
  const gst=+document.getElementById('sg')?.value||0;
  const tot=+document.getElementById('stot')?.value||0;
  if(!tot)return;
  const r=document.getElementById('sr');
  if(r)r.value=(tot/qty/(1+gst/100)).toFixed(2);
}

function addItem(){
  const nameText=(document.getElementById('sp-text')?.value||'').trim();
  if(!nameText){alert('Please enter product name');return}
  const qty=+document.getElementById('sq').value||1;
  const gst=+document.getElementById('sg').value||0;
  let rate=+document.getElementById('sr').value||0;
  const totInp=+document.getElementById('stot')?.value||0;
  if(!rate&&totInp)rate=totInp/qty/(1+gst/100);
  if(!rate){alert('Please enter Rate or Total');return}
  // Auto-add to inventory if new product
  let pId=null;
  const existing=D.products.find(p=>p.name.toLowerCase()===nameText.toLowerCase());
  if(existing){
    pId=existing.id;
    // अगर rate बदला है तो inventory में update करें
    if(existing.sellPrice!==parseFloat(rate.toFixed(2))){
      existing.sellPrice=parseFloat(rate.toFixed(2));
      sb.from('products').update({sell_price:existing.sellPrice}).eq('id',existing.id).catch(()=>{});
    }
  }
  else{
    const np={id:Date.now(),name:nameText,barcode:'',hsn:document.getElementById('sh')?.value||'',gst,buyPrice:0,sellPrice:parseFloat(rate.toFixed(2)),stock:0,minStock:0,unit:'Pcs'};
    D.products.push(np);pId=np.id;
    D._autoAddedPIds=D._autoAddedPIds||new Set();
    D._autoAddedPIds.add(np.id);
    saveLocal(); // Save to local immediately so it persists
    // Save to Supabase
    sb.from('products').insert({id:np.id,shop_id:currentShop.id,name:np.name,barcode:'',hsn:np.hsn,gst:np.gst,buy_price:0,sell_price:np.sellPrice,stock:0,min_stock:0,unit:'Pcs'})
      .then(({error})=>{if(error)sb.from('products').upsert({id:np.id,shop_id:currentShop.id,name:np.name,barcode:'',hsn:np.hsn,gst:np.gst,buy_price:0,sell_price:np.sellPrice,stock:0,min_stock:0,unit:'Pcs'}).catch(()=>{});})
      .catch(()=>{});
  }
  // टोटल column दिया हो तो: taxable=floor, gst=floor, total=base+gstAmt ≤ totInp
  let base, gstAmt, total;
  if(totInp){
    const rawGst = totInp * gst / (100 + gst);
    gstAmt = Math.floor(rawGst * 100) / 100;             // floor — slightly less
    base   = Math.floor((totInp - gstAmt) * 100) / 100;  // floor ← taxable
    total  = parseFloat((base + gstAmt).toFixed(2));      // ≤ totInp ✓
  } else {
    base   = parseFloat((qty * rate).toFixed(2));
    gstAmt = parseFloat((base * gst / 100).toFixed(2));
    total  = parseFloat((base + gstAmt).toFixed(2));
  }
  D.billItems.push({pId,name:nameText,qty,rate,gst,base,gstAmt,total,hsn:document.getElementById('sh')?.value||''});
  document.getElementById('sp-text').value='';
  document.getElementById('sq').value=1;
  document.getElementById('sr').value='';
  document.getElementById('stot').value='';
  document.getElementById('sh').value='';
  const hb=document.getElementById('hsg');if(hb)hb.style.display='none';
  document.getElementById('sp-text').focus();
  renderBillItems();
}
function renderBillItems(){
  const tb=document.getElementById('bi-body');if(!tb)return;
  const items=D.billItems||[];
  if(!items.length)tb.innerHTML='<tr><td colspan="9" style="text-align:center;padding:1rem;color:var(--t2)">No items added</td></tr>';
  else tb.innerHTML=items.map((item,i)=>`<tr><td>${safeText(item.name)}${item.hsn?'<br><small style="color:var(--t3)">HSN:'+item.hsn+'</small>':''}</td><td>${item.qty}</td><td>${fmt(item.rate)}</td><td>${item.gst}%</td><td>${fmt(item.base)}</td><td>${fmt(item.gstAmt)}</td><td><b>${fmt(item.total)}</b></td><td style="white-space:nowrap"><button class="btn bts" onclick="editItem(${i})" style="margin-right:3px" title="Edit">✏️</button><button class="btn bts btd" onclick="rmItem(${i})" title="Remove">✕</button></td></tr>`).join('');
  const sub=items.reduce((s,i)=>s+i.base,0),gt=items.reduce((s,i)=>s+i.gstAmt,0);
  const grand=sub+gt;
  const roundOff=Math.round(grand)-grand;
  const totalPayable=Math.round(grand);
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v};
  set('tsub',fmt(sub));set('tcg',fmt(gt/2));set('tsg',fmt(gt/2));
  set('tgrand_before',fmt(grand));
  set('tgr',fmt(grand));
  const roEl=document.getElementById('tro-row');
  if(roEl)roEl.style.display=roundOff!==0?'flex':'none';
  const roAmt=document.getElementById('tro-amt');
  if(roAmt)roAmt.textContent=(roundOff>0?'+':'')+fmtN(roundOff);
  calcDiscount();
  // Live preview update
  updateLivePreview();
}

function calcDiscount(){
  const items=D.billItems||[];
  const subtotal=items.reduce((s,i)=>s+i.total,0);
  const discVal=+document.getElementById('disc-val')?.value||0;
  const discType=document.getElementById('disc-type')?.value||'pct';
  let discAmt=0;
  if(discVal>0){
    if(discType==='pct') discAmt=parseFloat((subtotal*discVal/100).toFixed(2));
    else discAmt=Math.min(parseFloat(discVal.toFixed(2)),subtotal);
  }
  const payable=Math.round(subtotal-discAmt);
  const ds=document.getElementById('disc-show');
  if(ds)ds.textContent=discAmt>0?'- '+fmt(discAmt):'';
  const tp=document.getElementById('t-payable');
  if(tp)tp.textContent='₹'+payable;
  D._discAmt=discAmt; D._discVal=discVal; D._discType=discType;
}

function editItem(i){
  const item=D.billItems[i];
  if(!item)return;
  // Populate the add-item form with existing item data
  const nameEl=document.getElementById('sp-text');
  const qtyEl=document.getElementById('sq');
  const rateEl=document.getElementById('sr');
  const gstEl=document.getElementById('sg');
  const totEl=document.getElementById('stot');
  const hsnEl=document.getElementById('sh');
  if(nameEl)nameEl.value=item.name;
  if(qtyEl)qtyEl.value=item.qty;
  if(rateEl)rateEl.value=item.rate;
  if(gstEl)gstEl.value=item.gst;
  if(hsnEl)hsnEl.value=item.hsn||'';
  if(totEl)totEl.value=item.total;
  // Remove the item so it can be re-added after editing
  D.billItems.splice(i,1);
  renderBillItems();
  if(nameEl)nameEl.focus();
}

function hsnS(v,boxId,inpId,gstId){
  const box=document.getElementById(boxId);if(!box)return;
  if(!v||v.length<2){box.style.display='none';return}
  const res=HSN_DB.filter(h=>h.keys.some(k=>k.includes(v.toLowerCase()))||h.desc.toLowerCase().includes(v.toLowerCase())||h.code.includes(v)).slice(0,6);
  if(!res.length){box.style.display='none';return}
  box.style.display='block';
  box.innerHTML='<div style="display:flex;flex-wrap:wrap;gap:4px;padding:4px 0">'+
    res.map(h=>`<span class="pill" onclick="selHSN('${h.code}',${h.gst},'${boxId}','${inpId}','${gstId}')">${h.code} – ${h.desc.substring(0,22)} (${h.gst}%)</span>`).join('')+'</div>'
}
function selHSN(code,gst,boxId,inpId,gstId){
  const i=document.getElementById(inpId);if(i)i.value=code;
  const g=document.getElementById(gstId);if(g)g.value=gst;
  const b=document.getElementById(boxId);if(b)b.style.display='none';
}
function clearBill(){D.billItems=[];D._discAmt=0;D._discVal=0;clearBillCust();const dv=document.getElementById('disc-val');if(dv)dv.value=0;renderBillItems();const bp=document.getElementById('bpreview');if(bp)bp.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;color:var(--t3);text-align:center"><p style="font-size:12px">Add items — preview will appear here</p></div>';}

function rmItem(i){
  const item=D.billItems[i];
  // अगर यह item इसी session में auto-add हुई है और कोई और बिल में नहीं है
  if(item?.pId&&D._autoAddedPIds?.has(item.pId)){
    const usedElsewhere=D.bills.some(b=>b.items?.some(x=>x.pId===item.pId));
    if(!usedElsewhere){
      D.products=D.products.filter(p=>p.id!==item.pId);
      D._autoAddedPIds.delete(item.pId);
      sb.from('products').delete().eq('id',item.pId).catch(()=>{});
    }
  }
  D.billItems.splice(i,1);renderBillItems();
}

async function genBill(){
  const items=D.billItems||[];
  if(!items.length){alert('Please add items first');return}
  const billId=+document.getElementById('bnum').value;
  const billDate=new Date(document.getElementById('bdate').value).toISOString();
  const sub=items.reduce((s,i)=>s+i.base,0),gt=items.reduce((s,i)=>s+i.gstAmt,0);
  const rawGrand=sub+gt;
  const discAmt=D._discAmt||0;
  const grand=parseFloat((rawGrand-discAmt).toFixed(2));
  const cId=document.getElementById('bc-id').value;
  let cust=cId?D.customers.find(c=>c.id===+cId):null;
  // नया customer बनाएं अगर name/phone भरा है लेकिन existing नहीं
  const bcName=(document.getElementById('bc-name').value||'').trim();
  const bcPhone=(document.getElementById('bc-phone').value||'').trim();
  if(!cust && (bcName||bcPhone)){
    // auto-create customer
    const newCust={id:Date.now(),name:bcName||'Walk-In',phone:bcPhone,
      gstin:(document.getElementById('bc-gstin').value||'').trim(),
      address:(document.getElementById('bc-addr').value||'').trim(),
      totalPurchase:0,udhar:0};
    D.customers.push(newCust);
    cust=newCust;
    try{await sb.from('customers').upsert({id:newCust.id,shop_id:currentShop.id,
      name:newCust.name,phone:newCust.phone,gstin:newCust.gstin,
      address:newCust.address,total_purchase:0,udhar:0});}
    catch(e){}
  }
  const payment=document.getElementById('bpay').value;
  const isUdhar=payment==='Credit/Udhar';
  const bill={id:billId,date:billDate,customer:cust?cust.name:'Walk-In',custId:cId||null,custGstin:cust?.gstin||'',custAddr:cust?.address||'',items:[...items],subtotal:sub,gstTotal:gt,grand,discAmt,discVal:D._discVal||0,discType:D._discType||'pct',payment};
  D.bills.unshift(bill);D.settings.nextBill=billId+1;
  if(cust){cust.totalPurchase=(cust.totalPurchase||0)+grand;if(isUdhar)cust.udhar=(+cust.udhar||0)+grand;}
  items.filter(i=>i.pId).forEach(({pId,qty})=>{const p=D.products.find(x=>x.id===pId);if(p&&+p.stock>0)p.stock=Math.max(0,+p.stock-qty)});
  saveLocal();
  try{
    await sb.from('bills').upsert({id:billId,shop_id:currentShop.id,date:billDate,customer:bill.customer,cust_id:cust?.id||null,cust_gstin:bill.custGstin,cust_addr:bill.custAddr,items:bill.items,subtotal:sub,gst_total:gt,grand,payment});
    await sb.from('shops').update({settings:D.settings}).eq('id',currentShop.id);
    if(cust)await sb.from('customers').update({total_purchase:cust.totalPurchase,udhar:cust.udhar||0}).eq('id',cust.id);
    for(const {pId,qty} of items.filter(i=>i.pId)){const p=D.products.find(x=>x.id===pId);if(p&&+p.stock>0)await sb.from('products').update({stock:p.stock}).eq('id',pId)}
    toast('Bill saved ✓');
  }catch(e){toast('Saved locally — sync pending','warn')}
  D.billItems=[];D._discAmt=0;D._discVal=0;
  clearBillCust();
  const dv=document.getElementById('disc-val');if(dv)dv.value=0;
  renderBillItems();showPreview(bill);
  // सभी related tabs refresh करें
  renderDash();
  renderUdhar();
  renderBillsTab();
  renderCust();
}

async function addProd(){
  const n=document.getElementById('pn').value.trim();
  if(!n){alert('Name is required');return}
  // Check duplicate name in inventory
  if(D.products.find(x=>x.name.toLowerCase()===n.toLowerCase())){
    if(!confirm('Product "'+n+'" already exists. Update it?'))return;
    // Update existing
    const existing=D.products.find(x=>x.name.toLowerCase()===n.toLowerCase());
    existing.barcode=document.getElementById('pbar').value||existing.barcode;
    existing.hsn=document.getElementById('ph').value||existing.hsn;
    existing.gst=+document.getElementById('pg').value||existing.gst;
    existing.buyPrice=+document.getElementById('pb').value||existing.buyPrice;
    existing.sellPrice=+document.getElementById('ps').value||existing.sellPrice;
    existing.stock=document.getElementById('pst').value!==''?+document.getElementById('pst').value:existing.stock;
    existing.minStock=document.getElementById('pm').value!==''?+document.getElementById('pm').value:existing.minStock;
    existing.unit=document.getElementById('pu').value||existing.unit;
    saveLocal();
    try{
      await sb.from('products').update({
        barcode:existing.barcode,hsn:existing.hsn,gst:existing.gst,
        buy_price:existing.buyPrice,sell_price:existing.sellPrice,
        stock:existing.stock,min_stock:existing.minStock,unit:existing.unit
      }).eq('id',existing.id);
      toast('Product updated ✓');
    }catch(e){toast('Saved locally','warn')}
    renderInv();
    return;
  }
  const p={
    id:Date.now(),
    name:n,
    barcode:document.getElementById('pbar').value.trim(),
    hsn:document.getElementById('ph').value.trim(),
    gst:+document.getElementById('pg').value||0,
    buyPrice:+document.getElementById('pb').value||0,
    sellPrice:+document.getElementById('ps').value||0,
    stock:+document.getElementById('pst').value||0,
    minStock:+document.getElementById('pm').value||0,
    unit:document.getElementById('pu').value
  };
  D.products.push(p);
  saveLocal();
  try{
    const {error}=await sb.from('products').insert({
      id:p.id,shop_id:currentShop.id,
      name:p.name,barcode:p.barcode,hsn:p.hsn,gst:p.gst,
      buy_price:p.buyPrice,sell_price:p.sellPrice,
      stock:p.stock,min_stock:p.minStock,unit:p.unit
    });
    if(error)throw error;
    toast('Product added to inventory ✓');
  }catch(e){
    // Try upsert as fallback
    await sb.from('products').upsert({
      id:p.id,shop_id:currentShop.id,
      name:p.name,barcode:p.barcode,hsn:p.hsn,gst:p.gst,
      buy_price:p.buyPrice,sell_price:p.sellPrice,
      stock:p.stock,min_stock:p.minStock,unit:p.unit
    }).catch(()=>{});
    toast('Product saved ✓');
  }
  // Clear form
  ['pn','pbar','ph','pb','ps','pst','pm'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  renderInv();
}

function custNameAC(v){
  const q=(v||'').toLowerCase().trim();
  const drop=document.getElementById('cn-drop');
  const warn=document.getElementById('cust-dup-warn');
  if(!drop) return;
  if(!q||q.length<1){drop.style.display='none';if(warn)warn.style.display='none';return;}
  const matches=D.customers.filter(c=>(c.name||'').toLowerCase().includes(q)).slice(0,5);
  // Exact match warning
  const exact=D.customers.find(c=>c.name.toLowerCase()===q);
  if(warn){
    if(exact){warn.style.display='block';warn.innerHTML='⚠️ इस नाम से पहले से customer है: <b>'+exact.name+'</b>'+(exact.phone?' ('+exact.phone+')':'');}
    else warn.style.display='none';
  }
  if(!matches.length){drop.style.display='none';return;}
  drop.style.display='block';
  drop.innerHTML=matches.map(c=>`<div onclick="custFillFields(${c.id})" style="padding:8px 12px;cursor:pointer;border-bottom:.5px solid var(--bdr);font-size:13px"><b>${c.name}</b><span style="font-size:11px;color:var(--t2);margin-left:6px">${c.phone||''}${c.gstin?' | '+c.gstin:''}</span></div>`).join('');
}

function custPhoneAC(v){
  const q=(v||'').trim();
  if(!q||q.length<3) return;
  const matches=D.customers.filter(c=>(c.phone||'').includes(q)).slice(0,5);
  if(!matches.length) return;
  const drop=document.getElementById('cn-drop');
  if(!drop) return;
  drop.style.display='block';
  drop.innerHTML=matches.map(c=>`<div onclick="custFillFields(${c.id})" style="padding:8px 12px;cursor:pointer;border-bottom:.5px solid var(--bdr);font-size:13px"><b>${c.name}</b><span style="font-size:11px;color:var(--t2);margin-left:6px">${c.phone||''}</span></div>`).join('');
}

  const cg=document.getElementById('cg');const ca=document.getElementById('ca');

    <button onclick="manualScanLookup()" style="background:var(--acc);color:#fff;border:none;padding:9px 16px;border-radius:9px;font-size:13px;cursor:pointer;white-space:nowrap">Search</button>
  </div>
  <div id="scan-result" style="padding:.875rem;display:none"></div>
</div>`;

  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}
    });
    scanStream=stream;
    const video=document.getElementById('scanner-video');
    video.srcObject=stream;await video.play();

    if('BarcodeDetector' in window){
      const detector=new BarcodeDetector({formats:['ean_13','ean_8','code_128','code_39','qr_code','upc_a','upc_e','itf']});
      scanInterval=setInterval(async()=>{
        try{
          const barcodes=await detector.detect(video);
          if(barcodes.length>0){clearInterval(scanInterval);onBarcodeDetected(barcodes[0].rawValue);}
        }catch(e){}
      },350);
    }else{
      const hint=document.querySelector('.scanner-hint');
      if(hint)hint.textContent='Camera ready — or enter barcode manually below';
    }
  }catch(e){
    const hint=document.querySelector('.scanner-hint');
    if(hint)hint.innerHTML='<span style="color:#fca5a5">Camera access denied.</span> Enter manually below.';
    const inp=document.getElementById('scan-inp');if(inp)inp.focus();
  }
}

function closeScanner(){
  if(scanInterval){clearInterval(scanInterval);scanInterval=null;}
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
  const root=document.getElementById('scanner-root');if(root)root.innerHTML='';
}

function onBarcodeDetected(code){
  if(navigator.vibrate)navigator.vibrate([100,50,100]);
  const prod=D.products.find(p=>p.barcode&&p.barcode===code);
  const el=document.getElementById('scan-result');
  if(!el)return;
  el.style.display='block';
  if(prod){
    el.style.cssText='padding:.875rem;background:var(--ok-bg);border-top:1px solid var(--bdr)';
    el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center">
      <div><b style="color:var(--ok-t)">✓ ${prod.name}</b><br><span style="font-size:12px;color:var(--t2)">${fmt(prod.sellPrice)} | GST ${prod.gst}% | Stock: ${prod.stock}</span></div>
      <button onclick="addFromScan(${prod.id})" style="background:var(--acc);color:#fff;border:none;padding:9px 14px;border-radius:9px;font-size:13px;cursor:pointer;white-space:nowrap">+ Add to Bill</button>
    </div>`;
  }else{
    el.style.cssText='padding:.875rem;background:var(--warn-bg);border-top:1px solid var(--bdr)';
    el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center">
      <div><b style="color:var(--warn-t)">${code}</b><br><span style="font-size:12px;color:var(--t2)">Not found in Inventory — click below to add</span></div>
      <button onclick="addFromScanNew('${code}')" style="background:#217346;color:#fff;border:none;padding:9px 14px;border-radius:9px;font-size:13px;cursor:pointer;white-space:nowrap">+ New Product</button>
    </div>`;
    setTimeout(()=>{
      if(scanStream&&'BarcodeDetector' in window){
        const video=document.getElementById('scanner-video');
        if(video&&!scanInterval){
          const d=new BarcodeDetector({formats:['ean_13','ean_8','code_128','code_39','qr_code','upc_a','upc_e','itf']});
          scanInterval=setInterval(async()=>{try{const b=await d.detect(video);if(b.length>0){clearInterval(scanInterval);scanInterval=null;onBarcodeDetected(b[0].rawValue);}}catch(e){}},350);
        }
      }
    },3000);
  }
}

function manualScanLookup(){
  const code=(document.getElementById('scan-inp')?.value||'').trim();
  if(!code){alert('Please enter barcode');return}
  onBarcodeDetected(code);

  try{

async function delBill(id){return deleteBill(id)}
async function deleteBill(id){
  const b=D.bills.find(x=>x.id===id);if(!b)return;
  if(!confirm(`Delete Bill ${billNo(id)} (${b.customer} — ${fmt(b.grand)})?\n\nThis cannot be undone.`))return;
  // Stock वापस करें
  (b.items||[]).filter(i=>i.pId).forEach(({pId,qty})=>{
    const p=D.products.find(x=>x.id===pId);if(p&&+p.minStock>0)p.stock=(+p.stock||0)+qty;
  });
  // Udhar reverse करें अगर उधार बिल था
  if(b.payment==='Credit/Udhar'&&b.custId){
    const cust=D.customers.find(x=>x.id===+b.custId);
    if(cust)cust.udhar=Math.max(0,(+cust.udhar||0)-b.grand);
  }
  D.bills=D.bills.filter(x=>x.id!==id);
  saveLocal();
  try{
    await sb.from('bills').delete().eq('id',id).eq('shop_id',currentShop.id);
    toast('Bill deleted ✓');
  }catch(e){toast('Local delete','warn')}
  renderBillsTab();renderDash();
}

function handleLogoUpload(inp){

  const r=new FileReader();
  r.onload=e=>{D.settings.logoImg=e.target.result;saveLocal();renderSettings();toast('Logo saved ✓');};

function clearLocalCache(){
  if(!confirm('Local cache clear करें? अगली बार cloud से fresh data load होगा।'))return;
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('ld_'));
  keys.forEach(k=>localStorage.removeItem(k));
  D={products:[],customers:[],bills:[],purchases:[],billItems:[],udhar:[],settings:D.settings};
  toast('Cache cleared ✓ — syncing...');
  syncAll().catch(()=>{});
}

function checkTrialStatus(){
  // Admin को कोई trial नहीं
  if(isAdminUser())return;

  // Block check
  if(D.settings?.blocked){
    showBlockedModal();
    return;
  }

  const createdAt=currentUser?.created_at||currentUser?.user_metadata?.created_at;
  if(!createdAt)return;
  const daysSince=Math.floor((Date.now()-new Date(createdAt).getTime())/(1000*60*60*24));

  // अगर shop के settings में paidDays है तो उसे trial में जोड़ें
  const extraDays=parseInt(D.settings?.paidDays||0,10);
  const effectiveDays=TRIAL_DAYS+extraDays;

  D.trialDaysLeft=Math.max(0,effectiveDays-daysSince);
  D.trialExpired=daysSince>effectiveDays;

  if(D.trialExpired){
    showTrialExpiredModal();
  } else {
    // Warning banner in last 7 days
    const banner=document.getElementById('trial-banner');
    if(banner){
      if(D.trialDaysLeft<=7){
        banner.style.display='block';
        banner.innerHTML='⏳ Trial expires in <b>'+D.trialDaysLeft+' days</b>. Pay to continue — Contact: <a href="https://wa.me/91'+getContactPhone()+'" target="_blank" style="color:#fef3c7;text-decoration:underline">WhatsApp '+getContactPhone()+'</a>';
      } else {
        banner.style.display='none';
      }
    }
  }
}

function purCalcTotal(){
  let grand=0;
  document.querySelectorAll('.pur-item-row').forEach(row=>{
    const qty=+row.querySelector('.pi-qty')?.value||0;
    const rate=+row.querySelector('.pi-rate')?.value||0;
    const tot=parseFloat((qty*rate).toFixed(2));
    const ti=row.querySelector('.pi-total');if(ti)ti.value=tot||'';
    grand+=tot;
  });
  const el=document.getElementById('pur-grand');
  if(el)el.textContent=fmt(grand);
}

function purProdAC(inp){
  const v=(inp.value||'').toLowerCase().trim();
  const row=inp.closest('.pur-item-row');
  if(!row) return;

  // Existing dropdown remove करें
  let drop=row.querySelector('.pur-ac-drop');
  if(drop) drop.remove();

  if(!v || v.length<1){
    // अगर exact match है तो rate fill करें
    const exact=D.products.find(p=>p.name.toLowerCase()===v);
    if(exact){
      const ri=row.querySelector('.pi-rate');
      if(ri&&!ri.value) ri.value=exact.buyPrice||'';
      purCalcTotal();
    }
    return;
  }

  const matches=D.products.filter(p=>p.name.toLowerCase().includes(v)).slice(0,8);
  if(!matches.length) return;

  // Dropdown बनाएं
  drop=document.createElement('div');
  drop.className='pur-ac-drop';
  drop.style.cssText='position:absolute;top:100%;left:0;right:0;background:var(--bg1);border:1px solid var(--bdr2);border-radius:9px;z-index:300;max-height:200px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.15);margin-top:2px';
  drop.innerHTML=matches.map(p=>`
    <div style="padding:7px 12px;cursor:pointer;border-bottom:.5px solid var(--bdr);font-size:13px"
      onmousedown="purProdSelect(this,'${p.name.replace(/'/g,"\'")}',${p.buyPrice||0},${p.stock||0})"
      onmouseover="this.style.background='var(--accl)'" onmouseout="this.style.background=''">
      <span style="font-weight:500">${p.name}</span>
      <span style="font-size:11px;color:var(--t2);margin-left:8px">₹${p.buyPrice||0} | Stock: ${p.stock||0}</span>
    </div>`).join('');

  const wrap=inp.parentElement;
  wrap.appendChild(drop);
}

function purProdSelect(el, name, buyPrice, stock){
  const row=el.closest('.pur-item-row');
  if(!row) return;
  const nameInp=row.querySelector('.pi-name');
  const rateInp=row.querySelector('.pi-rate');
  const qtyInp=row.querySelector('.pi-qty');
  if(nameInp) nameInp.value=name;
  if(rateInp && !rateInp.value) rateInp.value=buyPrice||'';
  if(qtyInp) qtyInp.focus();
  // Dropdown हटाएं
  const drop=row.querySelector('.pur-ac-drop');
  if(drop) drop.remove();
  purCalcTotal();
}

async function savePurchase(){
  // purCalcTotal पहले run करें ताकि totals fresh हों
  purCalcTotal();
  const rows=[...document.querySelectorAll('.pur-item-row')];
  const items=rows.map(row=>({
    name:(row.querySelector('.pi-name')?.value||'').trim(),
    qty:+row.querySelector('.pi-qty')?.value||0,
    rate:+row.querySelector('.pi-rate')?.value||0,
    total:parseFloat(((+row.querySelector('.pi-qty')?.value||0)*(+row.querySelector('.pi-rate')?.value||0)).toFixed(2))
  })).filter(i=>i.name&&i.qty>0&&i.rate>0);
  if(!items.length){
    toast('कम से कम एक item डालें — Product Name, Qty और Rate ज़रूरी हैं','err');
    return;
  }
  const grand=parseFloat(items.reduce((s,i)=>s+i.total,0).toFixed(2));
  // Date safely parse करें
  const dateVal=document.getElementById('pur-date')?.value||new Date().toISOString().split('T')[0];
  const parsedDate=new Date(dateVal);
  const safeDate=isNaN(parsedDate.getTime())?new Date().toISOString():parsedDate.toISOString();
  const pur={
    id:'pur_'+Date.now(),
    date:safeDate,
    supplier:document.getElementById('pur-sup')?.value.trim()||'Unknown',
    invNo:document.getElementById('pur-inv')?.value.trim()||'',
    items,total:grand,
    notes:document.getElementById('pur-notes')?.value.trim()||''
  };
  // Update stock — inventory में जोड़ें / नया product create करें
  for(const {name,qty,rate} of items){
    const p=D.products.find(x=>x.name.toLowerCase()===name.toLowerCase());
    if(p){
      // Existing product — stock बढ़ाएं
      p.stock=(+p.stock||0)+qty;
      sb.from('products').update({stock:p.stock}).eq('id',p.id).catch(()=>{});
    } else {
      // नया product — inventory में add करें
      const newProd={
        id:Date.now()+Math.floor(Math.random()*1000),
        name, barcode:'', hsn:'', gst:0,
        buyPrice:rate, sellPrice:rate,
        stock:qty, minStock:5, unit:'Pcs'
      };
      D.products.push(newProd);
      sb.from('products').insert({
        id:newProd.id, shop_id:currentShop.id,
        name:newProd.name, barcode:'', hsn:'', gst:0,
        buy_price:rate, sell_price:rate,
        stock:qty, min_stock:5, unit:'Pcs'
      }).catch(()=>{});
    }
  }
  D.purchases.unshift(pur);
  saveLocal();
  try{
    await sb.from('purchases').insert({id:pur.id,shop_id:currentShop.id,date:pur.date,supplier:pur.supplier,items:pur.items,total:pur.total,notes:pur.notes});
    toast('Purchase saved ✓ — Inventory updated');
  }catch(e){toast('Saved locally — sync pending','warn')}
  renderPurchase();
  renderInv(); // inventory tab refresh करें
}

async function delPurchase(id){
  if(!confirm('Delete this purchase entry?'))return;
  // Reverse stock
  const pur=D.purchases.find(x=>x.id===id);
  if(pur)(pur.items||[]).forEach(({name,qty})=>{
    const p=D.products.find(x=>x.name.toLowerCase()===name.toLowerCase());
    if(p){p.stock=Math.max(0,(+p.stock||0)-qty);sb.from('products').update({stock:p.stock}).eq('id',p.id).catch(()=>{});}
  });
  D.purchases=D.purchases.filter(x=>x.id!==id);
  saveLocal();
  try{await sb.from('purchases').delete().eq('id',id);toast('Deleted ✓')}
  catch(e){toast('Local delete','warn')}
  renderPurchase();
}

function expPurchases(){
  const rows=[];
  D.purchases.forEach(p=>(p.items||[]).forEach(i=>rows.push([new Date(p.date).toLocaleDateString('en-IN'),p.supplier||'',i.name,i.qty,fmtN(i.rate),fmtN(i.total),safeText(p.notes||'')])));
  dlCSV(csv(['Date','Supplier','Product','Qty','Rate','Total','Notes'],rows),'purchases_'+new Date().toLocaleDateString('en-IN').replace(/\//g,'-')+'.csv');
}

// ── ADMIN PANEL ──
async function openAdmin(){
  if(!isAdminUser()){toast('Access denied','err');return;}
  activeTab='admin';
  const el=document.getElementById('ptitle');if(el)el.textContent='👑 Admin Panel';
  // Clear all tabs
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const tab=document.getElementById('tab-admin');if(tab)tab.classList.add('on');
  // Update nav active state
  document.querySelectorAll('.nav').forEach(n=>{
    const oc=n.getAttribute('onclick')||'';
    n.classList.toggle('on',oc.includes('openAdmin'));
  });
  renderAdmin();
  const content=document.querySelector('.content');if(content)content.scrollTop=0;
}

async function renderAdmin(){
  const el=document.getElementById('tab-admin');if(!el)return;
  el.innerHTML='<div style="text-align:center;padding:2rem"><div class="loader"></div><p style="margin-top:1rem;color:var(--t2)">Loading admin data...</p></div>';
  try{
    // Get current session token for auth
    const {data:{session}}=await sb.auth.getSession();
    if(!session){el.innerHTML='<div class="card"><p>Not logged in</p></div>';return;}
    const token=session.access_token;

    // Fetch all shops using REST API with auth header (bypasses RLS for own data)
    // We use Supabase REST directly — RLS still applies but admin owns shops policy
    // Solution: add admin policy in Supabase OR use a Supabase Function
    // Quick workaround: fetch from Supabase with select that includes a filter
    // that returns all if admin (we set this via Supabase policy)

    // Try direct fetch — works if admin policy added in Supabase
    const shopsRes=await fetch(SB_URL+'/rest/v1/shops?select=id,name,gstin,owner_id,settings,created_at&order=created_at.desc',{
      headers:{
        'apikey':SB_KEY,
        'Authorization':'Bearer '+token,
        'Content-Type':'application/json',
        'Prefer':'return=representation'
      }
    });
    const shops=await shopsRes.json();

    // Fetch bill counts
    const billRes=await fetch(SB_URL+'/rest/v1/bills?select=shop_id&limit=10000',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token}
    });
    const billData=await billRes.json();
    const countMap={};
    (Array.isArray(billData)?billData:[]).forEach(b=>{countMap[b.shop_id]=(countMap[b.shop_id]||0)+1;});

    const shopList=Array.isArray(shops)?shops:[];
    const now=Date.now();
    const total=shopList.length;
    const active=shopList.filter(s=>(countMap[s.id]||0)>0).length;
    const blocked=shopList.filter(s=>s.settings?.blocked).length;

    if(total===0){
      el.innerHTML='<div class="card" style="text-align:center;padding:2rem">'
        +'<p style="font-size:14px;font-weight:600;margin-bottom:.5rem">No shops found</p>'
        +'<p style="font-size:12px;color:var(--t2)">Admin policy not set in Supabase yet.</p>'
        +'<div style="background:var(--info-bg);color:var(--info-t);padding:1rem;border-radius:9px;margin-top:1rem;text-align:left;font-size:12px">'
        +'<p style="font-weight:600;margin-bottom:.5rem">Supabase में यह SQL चलाएं:</p>'
        +'<code style="font-size:11px;white-space:pre-wrap;display:block;background:var(--bg2);padding:.75rem;border-radius:6px">'
        +'CREATE POLICY &quot;admin_all_shops&quot; ON shops\nFOR ALL USING (\n  auth.jwt() -&gt;&gt; &apos;user_role&apos; = &apos;admin&apos;\n  OR auth.uid() = owner_id\n);\n\nCREATE POLICY &quot;admin_all_bills&quot; ON bills\nFOR SELECT USING (\n  auth.jwt() -&gt;&gt; &apos;user_role&apos; = &apos;admin&apos;\n  OR shop_id IN (SELECT id FROM shops WHERE owner_id = auth.uid())\n);'
        +'</code>'
        +'<p style="margin-top:.75rem">SQL चलाने के बाद Admin Panel refresh करें।</p>'
        +'</div>'
        +'<button class="btn btp" style="margin-top:1rem" onclick="renderAdmin()">↻ Refresh</button>'
        +'</div>';
      return;
    }

    el.innerHTML='<div class="g4" style="margin-bottom:1.25rem">'
      +'<div class="sc"><div class="lbl">Total Shops</div><div class="val">'+total+'</div></div>'
      +'<div class="sc"><div class="lbl">Active (bills>0)</div><div class="val" style="color:var(--ok-t)">'+active+'</div></div>'
      +'<div class="sc"><div class="lbl">Blocked</div><div class="val" style="color:var(--err-t)">'+blocked+'</div></div>'
      +'<div class="sc"><div class="lbl">Total Bills</div><div class="val">'+(Array.isArray(billData)?billData.length:0)+'</div></div>'
      +'</div>'
      +'<div class="card"><div class="ct">All Registered Shops</div><div style="overflow-x:auto">'
      +'<table><thead><tr><th>Shop</th><th>Contact</th><th>Bills</th><th>Joined</th><th>Trial</th><th>Status</th><th>Block</th><th>Payment (दिन)</th></tr></thead><tbody>'
      +shopList.map(s=>{
        const joinedDays=s.created_at?Math.floor((now-new Date(s.created_at).getTime())/(864e5)):0;
        const extraDays=parseInt(s.settings?.paidDays||0,10);
        const effectiveDays=TRIAL_DAYS+extraDays;
        const trialLeft=Math.max(0,effectiveDays-joinedDays);
        const trialExpired=joinedDays>effectiveDays;
        const isBlocked=s.settings?.blocked||false;
        const bills=countMap[s.id]||0;
        const phone=s.settings?.phone||'';
        return '<tr>'
          +'<td><b>'+(safeText(s.name)||'-')+'</b><br><small style="color:var(--t2)">'+(s.gstin||'No GSTIN')+'</small></td>'
          +'<td style="font-size:11px">'+(phone?'<a href="https://wa.me/91'+phone+'" target="_blank" style="color:var(--acc)">📲 '+phone+'</a>':'-')+'</td>'
          +'<td><span class="bdg '+(bills>0?'bg':'by')+'">'+bills+'</span></td>'
          +'<td style="font-size:11px">'+(s.created_at?new Date(s.created_at).toLocaleDateString('en-IN'):'-')+'</td>'
          +'<td>'+(trialExpired?'<span class="bdg br">Expired</span>'+(extraDays>0?' <span class="bdg bg">+'+extraDays+'d paid</span>':''):'<span class="bdg bg">'+trialLeft+'d left</span>'+(extraDays>0?' <span class="bdg bb">+'+extraDays+'d</span>':''))+'</td>'
          +'<td>'+(isBlocked?'<span class="bdg br">Blocked</span>':'<span class="bdg bg">Active</span>')+'</td>'
          +'<td style="white-space:nowrap">'
          +'<button class="btn bts '+(isBlocked?'btp':'btd')+'" onclick="adminToggleBlock(this)" data-sid="'+s.id+'" data-blocked="'+isBlocked+'">'+(isBlocked?'✓ Unblock':'⊘ Block')+'</button> '
          +'<span style="display:inline-flex;align-items:center;gap:4px">'
          +'<input type="number" id="days-'+s.id+'" min="1" max="365" value="30" style="width:56px;font-size:12px;padding:4px 6px;min-height:0;height:30px;border-radius:6px;border:1px solid var(--bdr2);text-align:center">'
          +'<button class="btn bts" style="background:#16a34a;color:#fff;border-color:#16a34a;height:30px;padding:0 8px" onclick="adminPaymentAccepted(\''+s.id+'\')">✓ Paid</button>'
          +'</span>'
          +'</td>'
          +'</tr>';
      }).join('')
      +'</tbody></table></div></div>';
  }catch(e){
    el.innerHTML='<div class="card"><p style="color:var(--err-t)">Error: '+e.message+'</p>'
      +'<button class="btn btp" style="margin-top:1rem" onclick="renderAdmin()">↻ Retry</button></div>';
  }
}

async function adminPaymentAccepted(shopId){
  const inp=document.getElementById('days-'+shopId);
  const days=parseInt(inp?.value||30,10);
  if(isNaN(days)||days<1){toast('Valid दिन डालें','err');return;}
  if(!confirm('क्या इस shop को '+days+' दिन के लिए activate करें?'))return;
  try{
    const {data:shop}=await sb.from('shops').select('settings').eq('id',shopId).single();
    const existing=parseInt(shop.settings?.paidDays||0,10);
    const newSettings={...(shop.settings||{}),paidDays:existing+days,blocked:false};
    const {error}=await sb.from('shops').update({settings:newSettings}).eq('id',shopId);
    if(error)throw error;
    toast('✓ Payment accepted — '+days+' दिन add हुए!');
    renderAdmin();
  }catch(e){
    toast('Error: '+e.message,'err');
  }
}

async function adminToggleBlock(btn){
  const shopId=btn.dataset.sid;
  const currentlyBlocked=btn.dataset.blocked==='true';
  const action=currentlyBlocked?'unblock':'block';
  if(!confirm('Are you sure you want to '+action+' this shop?'))return;
  try{
    const {data:shop}=await sb.from('shops').select('settings').eq('id',shopId).single();
    const newSettings={...(shop.settings||{}),blocked:!currentlyBlocked};
    const {error}=await sb.from('shops').update({settings:newSettings}).eq('id',shopId);
    if(error)throw error;
    toast((currentlyBlocked?'Shop unblocked ✓':'Shop blocked ✓'));
    renderAdmin();
  }catch(e){
    toast('Error: '+e.message,'err');
  }
}
